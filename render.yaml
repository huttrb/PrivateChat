services:
  - type: web
    name: privatechat-signaling
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: PORT
        value: 10000
      # Значения задаются в дашборде Render (Environment), НЕ в этом файле.
      - key: METERED_URL
        sync: false
      - key: EXPRESSTURN_USERNAME
        sync: false
      - key: EXPRESSTURN_CREDENTIAL
        sync: false
      - key: EXPRESSTURN_URLS
        sync: false
